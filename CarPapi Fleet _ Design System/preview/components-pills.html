<!doctype html>
<html><head><meta charset="utf-8"><title>Pills + chips</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="min-height:auto;padding:18px">
  <div class="hud" style="margin-bottom:12px">STATUS CHIPS · FLAT, PIXEL-EDGED</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;font:var(--t-callsign);letter-spacing:var(--tracking-loose);text-transform:uppercase">
    <span style="padding:5px 8px;background:var(--ok-wash);color:var(--ok);border:2px solid var(--ok)">● ONLINE</span>
    <span style="padding:5px 8px;background:var(--info-wash);color:var(--info);border:2px solid var(--info)">▸ WAITING</span>
    <span style="padding:5px 8px;background:var(--warn-wash);color:var(--warn);border:2px solid var(--warn)">◐ DEGRADED</span>
    <span style="padding:5px 8px;background:var(--danger-wash);color:var(--danger);border:2px solid var(--danger)">✕ FAILED</span>
    <span style="padding:5px 8px;background:var(--idle-wash);color:var(--idle);border:2px solid var(--idle)">○ DORMANT</span>
  </div>
  <div class="hud" style="margin-top:18px;margin-bottom:12px">TIER CHIPS</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;font:var(--t-callsign);letter-spacing:var(--tracking-loose);text-transform:uppercase">
    <span style="padding:5px 8px;background:rgba(54,153,255,0.16);color:var(--tier-ingest);border:2px solid var(--tier-ingest)">INGEST</span>
    <span style="padding:5px 8px;background:rgba(183,148,246,0.16);color:var(--tier-enrich);border:2px solid var(--tier-enrich)">ENRICH</span>
    <span style="padding:5px 8px;background:rgba(94,234,212,0.16);color:var(--tier-quality);border:2px solid var(--tier-quality)">QUALITY</span>
    <span style="padding:5px 8px;background:rgba(255,168,0,0.16);color:var(--tier-cloud);border:2px solid var(--tier-cloud)">CLOUD-OPS</span>
    <span style="padding:5px 8px;background:rgba(244,114,182,0.16);color:var(--tier-delivery);border:2px solid var(--tier-delivery)">DELIVERY</span>
  </div>
</div></body></html>
