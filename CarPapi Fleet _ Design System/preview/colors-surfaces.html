<!doctype html>
<html><head><meta charset="utf-8"><title>Surfaces</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="min-height:auto;padding:18px">
  <div class="hud" style="margin-bottom:12px">SURFACES · BG-0 → BG-5</div>
  <div style="display:flex;gap:6px">
    <div style="flex:1;background:var(--bg-0);height:72px;border:2px solid var(--bg-0);padding:6px;display:flex;flex-direction:column;justify-content:flex-end">
      <div class="lbl" style="color:var(--fg-3)">BG-0</div>
      <div class="lbl" style="color:var(--fg-4);font-size:10px">#0B0D14</div>
    </div>
    <div style="flex:1;background:var(--bg-1);height:72px;border:2px solid var(--bg-0);padding:6px;display:flex;flex-direction:column;justify-content:flex-end">
      <div class="lbl" style="color:var(--fg-3)">BG-1</div>
      <div class="lbl" style="color:var(--fg-4);font-size:10px">#11131C</div>
    </div>
    <div style="flex:1;background:var(--bg-2);height:72px;border:2px solid var(--bg-0);padding:6px;display:flex;flex-direction:column;justify-content:flex-end">
      <div class="lbl" style="color:var(--fg-3)">BG-2</div>
      <div class="lbl" style="color:var(--fg-4);font-size:10px">#181A26</div>
    </div>
    <div style="flex:1;background:var(--bg-3);height:72px;border:2px solid var(--bg-0);padding:6px;display:flex;flex-direction:column;justify-content:flex-end">
      <div class="lbl" style="color:var(--fg-3)">BG-3</div>
      <div class="lbl" style="color:var(--fg-4);font-size:10px">#1E1E2D</div>
    </div>
    <div style="flex:1;background:var(--bg-4);height:72px;border:2px solid var(--bg-0);padding:6px;display:flex;flex-direction:column;justify-content:flex-end">
      <div class="lbl" style="color:var(--fg-3)">BG-4</div>
      <div class="lbl" style="color:var(--fg-4);font-size:10px">#262838</div>
    </div>
    <div style="flex:1;background:var(--bg-5);height:72px;border:2px solid var(--bg-0);padding:6px;display:flex;flex-direction:column;justify-content:flex-end">
      <div class="lbl" style="color:var(--fg-3)">BG-5</div>
      <div class="lbl" style="color:var(--fg-4);font-size:10px">#2F3144</div>
    </div>
  </div>
  <div class="hud" style="margin-top:18px;margin-bottom:8px">FOREGROUND · FG-1 → FG-5</div>
  <div style="display:flex;gap:18px;align-items:baseline;flex-wrap:wrap;font:var(--t-body-pixel)">
    <div><span style="color:var(--fg-1);font-weight:700">PRIMARY</span> <span class="lbl" style="color:var(--fg-4);font-size:9px">FG-1</span></div>
    <div><span style="color:var(--fg-2)">BODY</span> <span class="lbl" style="color:var(--fg-4);font-size:9px">FG-2</span></div>
    <div><span style="color:var(--fg-3)">MUTED</span> <span class="lbl" style="color:var(--fg-4);font-size:9px">FG-3</span></div>
    <div><span style="color:var(--fg-4)">DIM</span> <span class="lbl" style="color:var(--fg-4);font-size:9px">FG-4</span></div>
    <div><span style="color:var(--fg-5)">SECTION</span> <span class="lbl" style="color:var(--fg-4);font-size:9px">FG-5</span></div>
  </div>
</div></body></html>
