<!doctype html>
<html><head><meta charset="utf-8"><title>Scanlines</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="min-height:auto;padding:0">
  <div style="position:relative;height:200px;background:linear-gradient(135deg,var(--bg-1),var(--bg-3));overflow:hidden;display:flex;align-items:center;padding:0 28px">
    <div style="position:absolute;inset:0;background:var(--scanlines);pointer-events:none"></div>
    <div style="position:absolute;inset:0;background:radial-gradient(60% 60% at 80% 0%,rgba(54,153,255,0.18),transparent 70%);pointer-events:none"></div>
    <div style="position:relative">
      <div class="t-callsign" style="color:var(--cyan);margin-bottom:8px">HUD TEXTURE · OPTIONAL</div>
      <div style="font:var(--t-h2);color:var(--fg-1);letter-spacing:-0.02em">Scanline overlay</div>
      <div class="mono" style="font-size:11px;color:var(--fg-3);margin-top:6px;letter-spacing:0.05em">1px white @ 1.8% alpha · 3px pitch · <code>var(--scanlines)</code></div>
      <div class="mono" style="font-size:11px;color:var(--fg-4);margin-top:4px;letter-spacing:0.05em">USE ON: hero areas, modal backdrops, agent detail header. NEVER on body text.</div>
    </div>
  </div>
</div></body></html>
