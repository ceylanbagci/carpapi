<!doctype html>
<html><head><meta charset="utf-8"><title>Brand colors</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="min-height:auto;padding:18px">
  <div class="hud" style="margin-bottom:12px">BRAND · ACCENT BLUE + HUD CYAN</div>
  <div style="display:flex;gap:8px">
    <div style="width:80px;height:80px;background:var(--accent-lo);border:2px solid var(--bg-0);padding:6px;display:flex;flex-direction:column;justify-content:flex-end">
      <div class="lbl" style="color:#fff;font-size:9px">LO</div>
      <div class="lbl" style="color:rgba(255,255,255,0.7);font-size:9px">#1F6FD9</div>
    </div>
    <div style="width:120px;height:80px;background:var(--accent);border:2px solid var(--bg-0);padding:6px;display:flex;flex-direction:column;justify-content:flex-end;box-shadow:var(--glow-blue)">
      <div class="lbl" style="color:#fff;font-size:9px">ACCENT</div>
      <div class="lbl" style="color:#fff;font-size:10px">#3699FF</div>
    </div>
    <div style="width:80px;height:80px;background:var(--accent-hi);border:2px solid var(--bg-0);padding:6px;display:flex;flex-direction:column;justify-content:flex-end">
      <div class="lbl" style="color:#fff;font-size:9px">HI</div>
      <div class="lbl" style="color:rgba(255,255,255,0.8);font-size:9px">#4FA8FF</div>
    </div>
    <div style="width:120px;height:80px;background:var(--accent-wash);border:2px solid var(--accent);padding:6px;display:flex;flex-direction:column;justify-content:flex-end">
      <div class="lbl" style="color:var(--accent);font-size:9px">WASH 14%</div>
    </div>
  </div>
  <div class="hud" style="margin-top:18px;margin-bottom:10px">CYAN · LIVE-DATA / SCAN</div>
  <div style="display:flex;gap:8px">
    <div style="width:120px;height:64px;background:var(--cyan);border:2px solid var(--bg-0);padding:6px;display:flex;flex-direction:column;justify-content:flex-end;box-shadow:var(--glow-cyan)">
      <div class="lbl" style="color:#0b0d14;font-size:9px">CYAN</div>
      <div class="lbl" style="color:#0b0d14;font-size:10px">#5EEAD4</div>
    </div>
    <div style="width:120px;height:64px;background:var(--cyan-wash);border:2px solid var(--cyan);padding:6px;display:flex;flex-direction:column;justify-content:flex-end">
      <div class="lbl" style="color:var(--cyan);font-size:9px">WASH 14%</div>
    </div>
  </div>
</div></body></html>
