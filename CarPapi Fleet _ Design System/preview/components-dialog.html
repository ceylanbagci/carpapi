<!doctype html>
<html><head><meta charset="utf-8"><title>Dialog box</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="min-height:auto;padding:24px;background:var(--scanlines),var(--bg-1)">
  <div class="hud" style="margin-bottom:14px">DIALOG · JRPG-STYLE CONFIRM BOX</div>
  <div style="width:480px;background:var(--bg-3);border:2px solid var(--accent);box-shadow:0 0 0 2px var(--bg-0),0 0 20px var(--accent-glow),var(--px-shadow-2)">
    <div style="padding:10px 14px;background:var(--bg-2);border-bottom:2px solid var(--bg-0);display:flex;justify-content:space-between;align-items:center">
      <div class="t-callsign" style="color:var(--accent)">▣ CONFIRM ACTION</div>
      <div class="lbl" style="color:var(--fg-4)">[ESC]</div>
    </div>
    <div style="padding:18px 16px;font:var(--t-body);color:var(--fg-2)">
      <div style="color:var(--fg-1);margin-bottom:8px;font:var(--t-h3)">RESCRAPE PERFORMANCE-FORD?</div>
      <div>87 inventory URLs · ~3 min · CMS: dealer.com</div>
      <div style="color:var(--warn);margin-top:6px">! 3rd retry in 24h — last attempt failed (http 429)</div>
    </div>
    <div style="padding:12px 14px;background:var(--bg-2);border-top:2px solid var(--bg-0);display:flex;justify-content:flex-end;gap:10px">
      <button class="px-btn">CANCEL</button>
      <button class="px-btn primary">CONFIRM ►</button>
    </div>
  </div>
</div></body></html>
