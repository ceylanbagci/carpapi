<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="min-height:auto;padding:18px">
  <div class="hud" style="margin-bottom:14px">SPACING · 4PX PIXEL GRID</div>
  <div style="display:flex;flex-direction:column;gap:6px">
    <div style="display:flex;align-items:center;gap:14px"><div style="width:2px;height:18px;background:var(--accent)"></div><div class="lbl" style="color:var(--fg-3);min-width:44px">s-0</div><div class="lbl" style="color:var(--fg-4)">2 PX</div></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:4px;height:18px;background:var(--accent)"></div><div class="lbl" style="color:var(--fg-3);min-width:44px">s-1</div><div class="lbl" style="color:var(--fg-4)">4 PX</div></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:8px;height:18px;background:var(--accent)"></div><div class="lbl" style="color:var(--fg-3);min-width:44px">s-2</div><div class="lbl" style="color:var(--fg-4)">8 PX</div></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:12px;height:18px;background:var(--accent)"></div><div class="lbl" style="color:var(--fg-3);min-width:44px">s-3</div><div class="lbl" style="color:var(--fg-4)">12 PX</div></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:16px;height:18px;background:var(--accent)"></div><div class="lbl" style="color:var(--fg-3);min-width:44px">s-4</div><div class="lbl" style="color:var(--fg-4)">16 PX</div></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:24px;height:18px;background:var(--accent)"></div><div class="lbl" style="color:var(--fg-3);min-width:44px">s-6</div><div class="lbl" style="color:var(--fg-4)">24 PX</div></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:40px;height:18px;background:var(--accent)"></div><div class="lbl" style="color:var(--fg-3);min-width:44px">s-8</div><div class="lbl" style="color:var(--fg-4)">40 PX</div></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:72px;height:18px;background:var(--accent)"></div><div class="lbl" style="color:var(--fg-3);min-width:44px">s-10</div><div class="lbl" style="color:var(--fg-4)">72 PX</div></div>
  </div>
</div></body></html>
