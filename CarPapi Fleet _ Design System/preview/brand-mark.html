<!doctype html>
<html><head><meta charset="utf-8"><title>Brand mark</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="min-height:auto;display:flex;align-items:center;gap:24px">
  <!-- Pixel-built brand mark: stepped car silhouette in tier-blue on bg-3 tile -->
  <div style="width:88px;height:88px;background:var(--bg-3);border:2px solid var(--bg-0);box-shadow:var(--px-inset-up),var(--px-shadow-1);display:grid;place-items:center">
    <svg width="56" height="56" viewBox="0 0 16 16" shape-rendering="crispEdges">
      <!-- car body -->
      <rect x="2" y="6" width="12" height="3" fill="#3699FF"/>
      <rect x="3" y="5" width="10" height="1" fill="#3699FF"/>
      <rect x="4" y="4" width="8"  height="1" fill="#3699FF"/>
      <!-- highlight -->
      <rect x="4" y="5" width="2" height="1" fill="#93C5FD"/>
      <!-- windows -->
      <rect x="5" y="5" width="2" height="1" fill="#0b0d14"/>
      <rect x="9" y="5" width="2" height="1" fill="#0b0d14"/>
      <!-- wheels -->
      <rect x="3" y="9" width="2" height="2" fill="#0b0d14"/>
      <rect x="11" y="9" width="2" height="2" fill="#0b0d14"/>
      <rect x="3" y="11" width="2" height="1" fill="#262838"/>
      <rect x="11" y="11" width="2" height="1" fill="#262838"/>
    </svg>
  </div>
  <div style="flex:1">
    <div class="t-title" style="color:var(--fg-1);font-size:18px">CARPAPI<br><span style="color:var(--accent)">FLEET</span></div>
    <div class="lbl" style="margin-top:8px;color:var(--cyan)">14 AGENTS · 5 TIERS · ONLINE</div>
  </div>
  <div style="display:flex;gap:6px;align-items:center">
    <span style="width:10px;height:10px;background:var(--ok);box-shadow:0 0 8px var(--ok-glow);animation:blink-led var(--dur-blink) steps(2,end) infinite"></span>
    <span class="hud" style="color:var(--ok)">SYS OK</span>
  </div>
</div></body></html>
