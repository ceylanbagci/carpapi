<!doctype html>
<html><head><meta charset="utf-8"><title>Corners</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="min-height:auto;padding:18px">
  <div class="hud" style="margin-bottom:12px">CORNERS · NO RADIUS, ONLY PIXEL NOTCH</div>
  <div style="display:flex;gap:14px;align-items:flex-end">
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
      <div style="width:88px;height:64px;background:var(--bg-3);border:2px solid var(--bg-0);box-shadow:var(--px-inset-up)"></div>
      <div class="lbl" style="color:var(--fg-3)">FLAT · DEFAULT</div>
      <div class="lbl" style="color:var(--fg-4);font-size:9px">--r-0</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
      <div class="px-notch" style="width:88px;height:64px;background:var(--bg-3);box-shadow:var(--px-inset-up)"></div>
      <div class="lbl" style="color:var(--fg-3)">NOTCHED 4PX</div>
      <div class="lbl" style="color:var(--fg-4);font-size:9px">.px-notch</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
      <div style="width:88px;height:64px;background:var(--bg-3);border:2px solid var(--bg-0);box-shadow:var(--glow-blue)"></div>
      <div class="lbl" style="color:var(--accent)">SELECTED · GLOW</div>
      <div class="lbl" style="color:var(--fg-4);font-size:9px">--glow-blue</div>
    </div>
  </div>
</div></body></html>
