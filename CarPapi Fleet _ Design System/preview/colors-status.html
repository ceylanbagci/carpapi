<!doctype html>
<html><head><meta charset="utf-8"><title>Status colors</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="min-height:auto;padding:18px">
  <div class="hud" style="margin-bottom:12px">STATUS PALETTE</div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">
    <div style="height:96px;background:var(--ok);border:2px solid var(--bg-0);padding:8px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--glow-ok)">
      <div class="lbl" style="color:#0b0d14;font-size:9px">OK · ONLINE</div>
      <div class="lbl" style="color:#0b0d14;font-size:10px">#1BC5BD</div>
    </div>
    <div style="height:96px;background:var(--warn);border:2px solid var(--bg-0);padding:8px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--glow-warn)">
      <div class="lbl" style="color:#0b0d14;font-size:9px">WARN · PAUSED</div>
      <div class="lbl" style="color:#0b0d14;font-size:10px">#FFA800</div>
    </div>
    <div style="height:96px;background:var(--danger);border:2px solid var(--bg-0);padding:8px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--glow-dngr)">
      <div class="lbl" style="color:#fff;font-size:9px">DANGER · FAIL</div>
      <div class="lbl" style="color:#fff;font-size:10px">#F1416C</div>
    </div>
    <div style="height:96px;background:var(--info);border:2px solid var(--bg-0);padding:8px;display:flex;flex-direction:column;justify-content:space-between">
      <div class="lbl" style="color:#fff;font-size:9px">INFO · WAIT</div>
      <div class="lbl" style="color:#fff;font-size:10px">#3699FF</div>
    </div>
    <div style="height:96px;background:var(--idle);border:2px solid var(--bg-0);padding:8px;display:flex;flex-direction:column;justify-content:space-between">
      <div class="lbl" style="color:#0b0d14;font-size:9px">IDLE · DORMANT</div>
      <div class="lbl" style="color:#0b0d14;font-size:10px">#7E8299</div>
    </div>
  </div>
</div></body></html>
