<!doctype html>
<html><head><meta charset="utf-8"><title>Input + slot</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="min-height:auto;padding:24px">
  <div class="hud" style="margin-bottom:14px">FORMS · COMMAND INPUT + SELECT SLOT</div>
  <div style="display:flex;flex-direction:column;gap:14px;max-width:480px">
    <div>
      <div class="lbl" style="color:var(--fg-3);margin-bottom:4px">SUMMON</div>
      <div style="display:flex;gap:8px">
        <div style="flex:1;background:var(--bg-0);border:2px solid var(--bg-4);padding:8px 12px;font:var(--t-body);color:var(--cyan);box-shadow:var(--px-inset-down)">&gt; rescrape performance-ford</div>
        <button class="px-btn primary">RUN ►</button>
      </div>
    </div>
    <div>
      <div class="lbl" style="color:var(--fg-3);margin-bottom:4px">FILTER · TIER</div>
      <div style="display:flex;gap:0">
        <button class="px-btn" style="background:var(--accent);color:#fff">ALL</button>
        <button class="px-btn">INGEST</button>
        <button class="px-btn">ENRICH</button>
        <button class="px-btn">QUALITY</button>
        <button class="px-btn">CLOUD</button>
      </div>
    </div>
    <div>
      <div class="lbl" style="color:var(--fg-3);margin-bottom:4px">SLOT · TARGET DEALER</div>
      <div style="background:var(--bg-0);border:2px solid var(--bg-4);padding:8px 12px;color:var(--fg-2);font:var(--t-body);display:flex;justify-content:space-between;align-items:center;box-shadow:var(--px-inset-down)">
        <span>performance-ford</span>
        <span class="lbl" style="color:var(--fg-4)">▼ 491 OPTIONS</span>
      </div>
    </div>
  </div>
</div></body></html>
