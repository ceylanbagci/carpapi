<!doctype html>
<html><head><meta charset="utf-8"><title>Elevation</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="min-height:auto;padding:24px">
  <div class="label" style="margin-bottom:18px">Elevation · drop + inset on dark, glow halos for state</div>
  <div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap">
    <div style="width:110px;height:74px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:10px;box-shadow:var(--shadow-1),var(--shadow-inset);display:grid;place-items:center;font:var(--t-mono);color:var(--fg-3);font-size:10px">shadow-1</div>
    <div style="width:110px;height:74px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:10px;box-shadow:var(--shadow-2),var(--shadow-inset);display:grid;place-items:center;font:var(--t-mono);color:var(--fg-3);font-size:10px">shadow-2</div>
    <div style="width:110px;height:74px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:10px;box-shadow:var(--shadow-3),var(--shadow-inset);display:grid;place-items:center;font:var(--t-mono);color:var(--fg-3);font-size:10px">shadow-3</div>
    <div style="width:110px;height:74px;background:var(--bg-3);border-radius:10px;box-shadow:var(--shadow-glow-blue);display:grid;place-items:center;font:var(--t-mono);color:var(--accent);font-size:10px">glow-blue</div>
    <div style="width:110px;height:74px;background:var(--bg-3);border-radius:10px;box-shadow:var(--shadow-glow-ok);display:grid;place-items:center;font:var(--t-mono);color:var(--ok);font-size:10px">glow-ok</div>
    <div style="width:110px;height:74px;background:var(--bg-3);border-radius:10px;box-shadow:var(--shadow-glow-warn);display:grid;place-items:center;font:var(--t-mono);color:var(--warn);font-size:10px">glow-warn</div>
    <div style="width:110px;height:74px;background:var(--bg-3);border-radius:10px;box-shadow:var(--shadow-glow-dngr);display:grid;place-items:center;font:var(--t-mono);color:var(--danger);font-size:10px">glow-danger</div>
  </div>
</div></body></html>
