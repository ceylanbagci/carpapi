<!doctype html>
<html><head><meta charset="utf-8"><title>Status LEDs</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="min-height:auto;padding:18px">
  <div class="hud" style="margin-bottom:14px">STATUS LEDS · 8PX SQUARES, COLOUR + GLOW</div>
  <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:center;font:var(--t-body-pixel)">
    <div style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;background:var(--ok);box-shadow:0 0 10px var(--ok-glow);animation:blink-led 1s steps(2,end) infinite"></span><span style="color:var(--ok)">ONLINE</span></div>
    <div style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;background:var(--info);box-shadow:0 0 10px var(--accent-glow)"></span><span style="color:var(--info)">WAITING</span></div>
    <div style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;background:var(--warn);box-shadow:0 0 10px var(--warn-glow)"></span><span style="color:var(--warn)">DEGRADED</span></div>
    <div style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;background:var(--danger);box-shadow:0 0 12px var(--danger-glow);animation:blink-led 0.6s steps(2,end) infinite"></span><span style="color:var(--danger)">FAILED</span></div>
    <div style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;background:var(--idle);border:1px solid var(--fg-4)"></span><span style="color:var(--idle)">OFFLINE</span></div>
  </div>
  <div class="hud" style="color:var(--fg-4);margin-top:14px">PULSE: ONLINE 1S · ALARM 0.6S · STATIC: WAIT / DEGRADED / OFFLINE</div>
</div></body></html>
