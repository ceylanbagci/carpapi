<!doctype html>
<html><head><meta charset="utf-8"><title>Tier palette</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="min-height:auto;padding:18px">
  <div class="hud" style="margin-bottom:12px">FIVE FLEET TIERS</div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">
    <div style="height:108px;background:rgba(54,153,255,0.16);border:2px solid var(--bg-0);border-top:6px solid var(--tier-ingest);padding:8px;display:flex;flex-direction:column;justify-content:space-between">
      <div class="lbl" style="color:var(--tier-ingest);font-size:10px">INGEST</div>
      <div>
        <div class="lbl" style="color:var(--fg-2);font-size:10px">#3699FF</div>
        <div class="hud" style="color:var(--fg-4);font-size:9px;margin-top:2px">4 AGENTS</div>
      </div>
    </div>
    <div style="height:108px;background:rgba(183,148,246,0.16);border:2px solid var(--bg-0);border-top:6px solid var(--tier-enrich);padding:8px;display:flex;flex-direction:column;justify-content:space-between">
      <div class="lbl" style="color:var(--tier-enrich);font-size:10px">ENRICH</div>
      <div>
        <div class="lbl" style="color:var(--fg-2);font-size:10px">#B794F6</div>
        <div class="hud" style="color:var(--fg-4);font-size:9px;margin-top:2px">2 AGENTS</div>
      </div>
    </div>
    <div style="height:108px;background:rgba(94,234,212,0.16);border:2px solid var(--bg-0);border-top:6px solid var(--tier-quality);padding:8px;display:flex;flex-direction:column;justify-content:space-between">
      <div class="lbl" style="color:var(--tier-quality);font-size:10px">QUALITY</div>
      <div>
        <div class="lbl" style="color:var(--fg-2);font-size:10px">#5EEAD4</div>
        <div class="hud" style="color:var(--fg-4);font-size:9px;margin-top:2px">3 AGENTS</div>
      </div>
    </div>
    <div style="height:108px;background:rgba(255,168,0,0.16);border:2px solid var(--bg-0);border-top:6px solid var(--tier-cloud);padding:8px;display:flex;flex-direction:column;justify-content:space-between">
      <div class="lbl" style="color:var(--tier-cloud);font-size:10px">CLOUD-OPS</div>
      <div>
        <div class="lbl" style="color:var(--fg-2);font-size:10px">#FFA800</div>
        <div class="hud" style="color:var(--fg-4);font-size:9px;margin-top:2px">3 AGENTS</div>
      </div>
    </div>
    <div style="height:108px;background:rgba(244,114,182,0.16);border:2px solid var(--bg-0);border-top:6px solid var(--tier-delivery);padding:8px;display:flex;flex-direction:column;justify-content:space-between">
      <div class="lbl" style="color:var(--tier-delivery);font-size:10px">DELIVERY</div>
      <div>
        <div class="lbl" style="color:var(--fg-2);font-size:10px">#F472B6</div>
        <div class="hud" style="color:var(--fg-4);font-size:9px;margin-top:2px">2 AGENTS</div>
      </div>
    </div>
  </div>
</div></body></html>
