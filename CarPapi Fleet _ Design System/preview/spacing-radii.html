<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="min-height:auto;padding:18px">
  <div class="label" style="margin-bottom:12px">Border radii</div>
  <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:52px;height:52px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:4px"></div><div class="mono" style="font-size:10px;color:var(--fg-3)">r-1 · 4</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:52px;height:52px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:6px"></div><div class="mono" style="font-size:10px;color:var(--fg-3)">r-2 · 6</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:52px;height:52px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:8px"></div><div class="mono" style="font-size:10px;color:var(--fg-3)">r-3 · 8</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:52px;height:52px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:10px"></div><div class="mono" style="font-size:10px;color:var(--fg-3)">r-4 · 10</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:52px;height:52px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:12px"></div><div class="mono" style="font-size:10px;color:var(--fg-3)">r-5 · 12</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:52px;height:52px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:14px"></div><div class="mono" style="font-size:10px;color:var(--fg-3)">r-6 · 14</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:52px;height:52px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:18px"></div><div class="mono" style="font-size:10px;color:var(--fg-3)">r-7 · 18</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:96px;height:32px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:999px;display:grid;place-items:center"><span class="mono" style="font-size:10px;color:var(--fg-3)">PILL</span></div><div class="mono" style="font-size:10px;color:var(--fg-3)">r-pill</div></div>
  </div>
</div></body></html>
